apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandbox-worker
  namespace: cloud-bp-advisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandbox-worker
  template:
    metadata:
      labels:
        app: sandbox-worker
    spec:
      nodeSelector:
        sandbox.gke.io/runtime: gvisor
      tolerations:
        - key: "sandbox.gke.io/runtime"
          operator: "Equal"
          value: "gvisor"
          effect: "NoSchedule"
      containers:
        - name: sandbox-worker
          image: asia-northeast3-docker.pkg.dev/duper-project-1/cba-repo/sandbox:latest
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: "duper-project-1"
            - name: GCP_PROJECT
              value: "duper-project-1"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: "/var/secrets/google/key.json"
          volumeMounts:
            - name: google-cloud-key
              mountPath: /var/secrets/google
              readOnly: true
      volumes:
        - name: google-cloud-key
          secret:
            secretName: gcp-sa-key
